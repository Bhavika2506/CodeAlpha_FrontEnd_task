<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scientific Calculator</title>
  <meta name="description" content="A modern scientific calculator with history, dark/light theme, and keyboard support." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="calculator-wrapper" id="calcWrapper">
    <!-- Toolbar -->
    <div class="toolbar">
      <button id="btnScientific" aria-label="Toggle scientific mode">🧪</button>
      <button id="btnHistory" aria-label="Toggle history">🕘</button>
      <button id="btnTheme" aria-label="Toggle theme">☀️</button>
    </div>

    <!-- Calculator -->
    <div class="calc-body">
      <div class="calc-display">
        <div class="history-line" id="historyLine"></div>
        <div class="display-value" id="displayValue" style="font-size:2.25rem;">0</div>
      </div>

      <div id="mainContent">
        <div class="buttons-container">
          <!-- Scientific buttons (hidden by default) -->
          <div class="sci-grid" id="sciGrid" style="display:none;"></div>
          <!-- Standard buttons -->
          <div class="btn-grid" id="stdGrid"></div>
        </div>
      </div>

      <!-- History panel (hidden by default) -->
      <div class="history-panel" id="historyPanel" style="display:none;">
        <div class="header">
          <span>History</span>
          <button class="clear-btn" id="clearHistory">Clear all</button>
        </div>
        <div class="history-list" id="historyList">
          <div class="history-empty">No calculations yet</div>
        </div>
      </div>
    </div>

    <p class="footer">Use keyboard for quick input</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
